<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disruptor Telemetry Dashboard</title>
    <style>
        :root {
            --bg-base: #181b1f;
            --bg-panel: #22252b;
            --bg-header: #111217;
            --border: #2c3235;
            --text: #d8d9da;
            --text-muted: #8e8e8e;
            --accent: #3274d9;
            --green: #73bf69;
            --red: #e02f44;
            --yellow: #f2cc0c;
            --orange: #ff780a;
            --font: 'Inter', Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-base);
            color: var(--text);
            font-family: var(--font);
        }

        /* ── Topbar ── */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 52px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-logo {
            color: var(--accent);
            font-size: 1.3rem;
            font-weight: 700;
        }

        .topbar-title {
            font-size: 1rem;
            font-weight: 500;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 0.85rem;
        }

        .topbar-right label {
            color: var(--text-muted);
        }

        .topbar-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .search-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1100;
            background: var(--bg-header);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px 8px 32px;
            border-radius: 20px;
            font-size: 0.85rem;
            width: 220px;
            outline: none;
            transition: border-color 0.2s, width 0.2s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .search-box:focus {
            border-color: var(--accent);
            width: 300px;
        }

        .search-wrap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1100;
        }

        .search-wrap::before {
            content: '🔍';
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            pointer-events: none;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            box-shadow: 0 0 4px var(--red);
            flex-shrink: 0;
        }

        .dot.on {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .g-select {
            background: #141619;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 2px;
            font: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        .g-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 2px;
            font: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .g-btn:hover,
        .g-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ── Grid ── */
        .grid {
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 8px;
        }

        /* ── Panel ── */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .panel:hover {
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
        }

        .panel:hover .p-ctrls {
            opacity: 1;
        }

        .panel.alert-warn {
            border-color: var(--yellow);
            border-left: 3px solid var(--yellow);
            box-shadow: 0 0 16px rgba(242, 204, 12, 0.3);
        }

        .panel.alert-warn .p-head {
            background: rgba(242, 204, 12, 0.08);
        }

        .panel.alert-warn .p-title {
            color: var(--yellow);
        }

        .panel.alert-warn .p-stat-last {
            color: var(--yellow);
        }

        .panel.alert-crit {
            border-color: var(--red);
            border-left: 3px solid var(--red);
            box-shadow: 0 0 20px rgba(224, 47, 68, 0.4);
            animation: crit-pulse 1.5s ease-in-out infinite;
        }

        .panel.alert-crit .p-head {
            background: rgba(224, 47, 68, 0.12);
        }

        .panel.alert-crit .p-title {
            color: var(--red);
        }

        .panel.alert-crit .p-stat-last {
            color: var(--red);
        }

        @keyframes crit-pulse {

            0%,
            100% {
                box-shadow: 0 0 14px rgba(224, 47, 68, 0.3);
            }

            50% {
                box-shadow: 0 0 28px rgba(224, 47, 68, 0.6);
            }
        }

        .alert-badge {
            display: none;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 1px 6px;
            border-radius: 2px;
            margin-left: 8px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .panel.alert-warn .alert-badge {
            display: inline-block;
            background: rgba(242, 204, 12, 0.15);
            color: var(--yellow);
            border: 1px solid rgba(242, 204, 12, 0.4);
        }

        .panel.alert-crit .alert-badge {
            display: inline-block;
            background: rgba(224, 47, 68, 0.15);
            color: var(--red);
            border: 1px solid rgba(224, 47, 68, 0.4);
            animation: badge-blink 1s step-end infinite;
        }

        @keyframes badge-blink {
            50% {
                opacity: 0.4;
            }
        }

        .p-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            border-bottom: 1px solid var(--border);
            min-height: 32px;
        }

        .p-title {
            font-size: 0.82rem;
            font-weight: 500;
            color: #33a2e5;
        }

        .p-ctrls {
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .p-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 0.85rem;
            line-height: 1;
        }

        .p-btn:hover {
            background: #343a40;
            color: var(--text);
        }

        .p-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .p-stat-row {
            display: flex;
            align-items: baseline;
            gap: 16px;
            padding: 4px 14px 0;
            pointer-events: none;
            z-index: 5;
        }

        .p-stat-last {
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--green);
        }

        .p-stat-mini {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .p-stat-mini b {
            color: var(--text);
            font-weight: 500;
        }

        .chart-wrap {
            width: 100%;
            height: 200px;
            min-height: 200px;
            flex: 1;
        }

        .p-legend {
            display: flex;
            gap: 16px;
            padding: 4px 14px 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }

        .p-legend span b {
            color: var(--text);
            font-weight: 500;
        }

        /* Maximized */
        .panel.maximized {
            position: fixed;
            top: 62px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            z-index: 1001;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
        }

        .panel.maximized .chart-wrap {
            height: 100%;
        }

        .panel.minimized .chart-wrap {
            display: none;
        }

        #backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(17, 18, 23, 0.85);
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        #backdrop.active {
            display: block;
        }

        /* ── Pause Banner ── */
        .pause-banner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--orange);
            color: #000;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 6px 20px;
            border-radius: 4px;
            z-index: 1100;
        }

        .pause-banner.show {
            display: block;
        }

        /* ── Merge Dropdown ── */
        .merge-dropdown {
            position: absolute;
            right: 0;
            top: 100%;
            z-index: 200;
            background: #1a1d22;
            border: 1px solid var(--border);
            border-radius: 4px;
            min-width: 220px;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .merge-item {
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .merge-item:hover {
            background: var(--accent);
            color: #fff;
        }

        .merge-dd-title {
            padding: 6px 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Multi-series Legend ── */
        .p-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-right: 12px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0 2px;
            line-height: 1;
        }

        .legend-remove:hover {
            color: var(--red);
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="topbar-left">
            <span class="topbar-logo">◱</span>
            <span class="topbar-title" id="g-title">Disruptor Telemetry</span>
        </div>
        <div class="topbar-right">
            <div class="topbar-meta"><span class="dot" id="ws-dot"></span><span id="ws-label">Disconnected</span></div>
            <div class="topbar-meta">⏱ <span id="msg-rate">0</span> msg/s</div>
            <div class="topbar-meta">⏱ Uptime: <span id="g-uptime" style="color:var(--text);font-weight:500;">0s</span>
            </div>
            <label>Window</label>
            <select id="sel-window" class="g-select">
                <option value="30">30s</option>
                <option value="60">1m</option>
                <option value="300" selected>5m</option>
                <option value="900">15m</option>
                <option value="1800">30m</option>
                <option value="3600">1h</option>
                <option value="14400">4h</option>
                <option value="0">All</option>
            </select>
            <button class="g-btn" id="btn-reset" title="Reset layout and merges"
                style="margin-left:8px;background:var(--bg-panel)">↻ Reset</button>
            <button class="g-btn" id="btn-pause" title="Pause live updates">⏸ Live</button>
        </div>
    </div>

    <div id="backdrop"></div>
    <div class="grid" id="dashboard"></div>
    <div class="pause-banner" id="pause-banner">⏸ Updates Paused</div>
    <div class="search-wrap"><input type="text" id="search-box" class="search-box"></div>

    <script src="/echarts.min.js"></script>
    <script src="/dashboard.js"></script>
</body>

</html>
